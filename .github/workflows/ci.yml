name: CI/CD Build & Lint

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: write

env:
  # Memaksa GitHub Actions runners menggunakan Node.js 24 untuk menghindari peringatan depresiasi Node 20
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_and_lint:
    name: Build, Lint & Deploy Application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          # Kami menghapus cache: 'npm' di sini karena package-lock.json mungkin belum/tidak di-commit ke Git.
          # Ini menghindari galat "Dependencies lock file is not found".

      - name: Install Dependencies
        run: |
          # Menghapus package-lock.json untuk memaksa npm membangun ulang struktur dependensi
          # dan mengunduh native binary @tailwindcss/oxide yang cocok dengan platform runner (linux-x64).
          # Ini memperbaiki masalah "Cannot find native binding" akibat perbedaan sistem operasi asal.
          rm -f package-lock.json
          npm install

      - name: Run Linter (Type check)
        run: |
          if npm run | grep -q "lint"; then
            npm run lint
          else
            if [ -f tsconfig.json ]; then
              npx tsc --noEmit
            else
              echo "Script 'lint' and tsconfig.json not found, skipping type check."
            fi
          fi

      - name: Build Production Bundle
        run: npm run build

      - name: Deploy to GitHub Pages
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
